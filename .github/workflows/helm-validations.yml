# This action checks the Helm Chart changes for linting
name: Validate Helm Charts

# Check runs on PRs created to merge to main branch
on:
  pull_request:
    branches: ["**"]

jobs:
  # This job will run helm lint on updated charts
  lint:
    name: CSM Chart Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: "0"

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: latest

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install chart-testing-action
        uses: helm/chart-testing-action@v2.8.0

      - name: Run chart-testing list-changed
        id: modified-charts
        run: |
          modified=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$modified" ]]; then
            echo "modified=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing linter
        if: ${{ steps.modified-charts.outputs.modified == 'true' }}
        run: ct lint --config ct.yaml

  lint-images:
    name: Lint CSM images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: "0"

      - name: Get changes files
        id: changed-files
        run: |
          echo "files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Lint image tags
        run: |
          FAIL=0
          CHANGED_FILES=${{ steps.changed-files.outputs.files }}

          for file in $CHANGED_FILES; do
            if [[ ! -f "$file" ]]; then
              echo "ERROR: File '$file' does not exist."
              exit 1
            fi
            
            echo "Checking $file"

            # Extract image references
            IMAGES=$(grep -Eo '(image: *|FROM )[a-zA-Z0-9\./_-]+:[a-zA-Z0-9\._-]+' "$file" || true)
            for image in $IMAGES; do
              TAG="${image##*:}"
              
              # Check if it looks like a semver (e.g. 1.0.0, 2.3.4)
              if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
                if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
                  echo "ERROR: Invalid tag in $file: $image"
                  FAIL=1
                fi
              fi
            done
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "Image tag linting failed"
            exit 1
          fi
          
          echo "✅ Image tag linting passed"
