# This Github action will create a Github release for updated helm-charts
name: Release Helm Charts

# Invocable as a manual workflow
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version. E.g. 1.14.0'
        required: true
      release_mode:
        description: 'normal: releases the changed charts only,  re-release: re-upload & release deleted charts'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - re-release

jobs:
  # This job will perform a helm release of all the csm charts that have been updated
  release-csm:
    runs-on: ubuntu-latest
    steps:
      # Check out code
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      # ===== RE-RELEASE MODE STEPS =====
      # Delete local release tags to ensure clean state for re-releasing deleted charts
      # This prevents old local tags from interfering with the re-upload process
      - name: Delete local release tags (re-release mode)
        if: ${{ inputs.release_mode == 're-release' }}
        run: |
          git tag -l | xargs git tag -d || true
          echo "Deleted all local release tags"

      - name: Manually package charts (re-release mode)
        if: ${{ inputs.release_mode == 're-release' }}
        run: |
          mkdir -p .cr-release-packages
          for chart in charts/*/; do
            if [ -d "$chart" ]; then
              chart_name=$(basename "$chart")
              echo "Building dependencies for $chart_name..."
              helm dependency build "$chart" || echo "No dependencies to build for $chart_name"
              echo "Packaging $chart_name..."
              helm package "$chart" -d .cr-release-packages || echo "Failed to package $chart_name (likely a subchart), skipping"
            fi
          done

      # ===== SHARED STEPS (BOTH MODES) =====
      - name: Set release branch name for install wizard release action
        run: |
          echo "release-v${{ inputs.version }}" >> branch_name.txt

      - name: Upload release branch name artifact
        uses: actions/upload-artifact@v7
        with:
          name: branch_name
          path: branch_name.txt

      - name: Create release branch
        # Branch name should already exist for patch releases
        run: |
          branch_name=release-v${{ inputs.version }}

          if [ "${{ inputs.release_mode }}" == "re-release" ]; then
            git fetch origin --no-tags
          else
            git fetch origin
          fi
          if git ls-remote --heads origin $branch_name | grep $branch_name; then
            echo "Branch $branch_name already exists. Skipping creation."
            git checkout $branch_name
          else
            git checkout -b $branch_name
            git push origin $branch_name
          fi

      # Run the helm chart release command
      - name: Install chart-releaser (re-release mode)
        if: ${{ inputs.release_mode == 're-release' }}
        run: |
          curl -sSLo cr.tar.gz https://github.com/helm/chart-releaser/releases/download/v1.7.0/chart-releaser_1.7.0_linux_amd64.tar.gz
          tar -xzf cr.tar.gz
          sudo mv cr /usr/local/bin/cr
          rm cr.tar.gz

      - name: Upload packages (re-release mode)
        if: ${{ inputs.release_mode == 're-release' }}
        run: |
          cr upload --owner ${{ github.repository_owner }} --git-repo ${{ github.event.repository.name }} --token ${{ secrets.GITHUB_TOKEN }} --package-path .cr-release-packages --skip-existing
          cr index --owner ${{ github.repository_owner }} --git-repo ${{ github.event.repository.name }} --token ${{ secrets.GITHUB_TOKEN }} --push
          # Force gh-pages update to trigger pages-build-deployment
          git fetch origin gh-pages
          git checkout gh-pages
          git commit --allow-empty -m "Force update for re-release"
          git push origin gh-pages
          git checkout release-v${{ inputs.version }}
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      # ===== NORMAL MODE STEP =====
      - name: Run csm chart-releaser (normal mode)
        if: ${{ inputs.release_mode == 'normal' }}
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: charts
          skip_existing: true
