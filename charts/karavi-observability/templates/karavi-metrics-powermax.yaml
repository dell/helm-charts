{{ if .Values.karaviMetricsPowermax.enabled }}
{{- $authorizationConfigSecret := lookup "v1" "Secret" .Release.Namespace "karavi-authorization-config" }}

apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: karavi-metrics-powermax
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: karavi-metrics-powermax
  namespace: {{ include "custom.namespace" . }}
spec:
  type: {{ .Values.karaviMetricsPowermax.service.type }}
  ports:
  - name: karavi-metrics-powermax
    port: 8081
    targetPort: 8081
  {{- if .Values.karaviMetricsPowermax.metrics.enabled }}
  - name: obs-metrics
    port: {{ .Values.karaviMetricsPowermax.metrics.port }}
    targetPort: {{ .Values.karaviMetricsPowermax.metrics.port }}
  {{- end }}
  selector:
    app.kubernetes.io/name: karavi-metrics-powermax
    app.kubernetes.io/instance: {{ .Release.Name }}

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: karavi-metrics-powermax
  namespace: {{ include "custom.namespace" . }}
  labels:
    app.kubernetes.io/name: karavi-metrics-powermax
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- if hasKey .Values "karaviMetricsPowermax.authorization" }}
  {{- if eq .Values.karaviMetricsPowermax.authorization.enabled true }}
  annotations:
    com.dell.karavi-authorization-proxy: "true"
  {{ end }}
  {{ end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: karavi-metrics-powermax
      app.kubernetes.io/instance: {{ .Release.Name }}
  replicas: 1
  strategy: {}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: karavi-metrics-powermax
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccount: {{ .Release.Name }}-metrics-powermax-controller
      containers:
      - name: karavi-metrics-powermax
        image: {{ .Values.karaviMetricsPowermax.image }}
        resources: {}
        {{- if .Values.karaviMetricsPowermax.metrics.enabled }}
        ports:
        - name: obs-metrics
          containerPort: {{ .Values.karaviMetricsPowermax.metrics.port }}
          protocol: TCP
        {{- end }}
        env:
        {{- $useRevProxySecret := and (hasKey .Values.karaviMetricsPowermax "useSecret") (.Values.karaviMetricsPowermax.useSecret | default false) }}
        - name: X_CSI_REVPROXY_USE_SECRET
          value: {{ $useRevProxySecret | quote }}
        - name: X_CSI_REVPROXY_SECRET_FILEPATH
          value: "/etc/powermax/config"
        - name: POWERMAX_METRICS_ENDPOINT
          value: "{{ .Values.karaviMetricsPowermax.endpoint }}"
        - name: POWERMAX_METRICS_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: TLS_ENABLED
          value: "true"
        - name: SSL_CERT_DIR
          value: /certs
        {{- if and .Values.karaviMetricsPowermax.metrics.enabled .Values.karaviMetricsPowermax.metrics.tlsCertSecret }}
        - name: X_CSI_METRICS_TLS_CERT_FILE
          value: /etc/metrics-tls/tls.crt
        - name: X_CSI_METRICS_TLS_KEY_FILE
          value: /etc/metrics-tls/tls.key
        {{- end }}
        volumeMounts:
            {{- if and (hasKey .Values.karaviMetricsPowermax "useSecret") (.Values.karaviMetricsPowermax.useSecret | default false) }}
        - name: powermax-reverseproxy-secret
          mountPath: /etc/powermax
            {{- else }}
        - name: powermax-reverseproxy-config
          mountPath: /etc/reverseproxy
            {{- end }}
        - name: tls-secret
          mountPath: /etc/ssl/certs
          readOnly: true
        - name: karavi-metrics-powermax-configmap
          mountPath: /etc/config
        - name: certs
          mountPath: /certs
        {{- if and .Values.karaviMetricsPowermax.metrics.enabled .Values.karaviMetricsPowermax.metrics.tlsCertSecret }}
        - name: metrics-tls
          mountPath: /etc/metrics-tls
          readOnly: true
        {{- end }}
      {{- if hasKey .Values.karaviMetricsPowermax "authorization" }}
      {{- if eq .Values.karaviMetricsPowermax.authorization.enabled true }}
      - name: karavi-authorization-proxy
        imagePullPolicy: IfNotPresent
        image: {{ required "Must provide the authorization sidecar container image." .Values.karaviMetricsPowermax.authorization.sidecarProxy.image }}
        env:
          - name: PROXY_HOST
            value: "{{ .Values.karaviMetricsPowermax.authorization.proxyHost }}"
          - name: SKIP_CERTIFICATE_VALIDATION
            value: "{{ .Values.karaviMetricsPowermax.authorization.skipCertificateValidation }}"
          - name: PLUGIN_IDENTIFIER
            value: powermax
          - name: ACCESS_TOKEN
            valueFrom:
              secretKeyRef:
                name: powermax-proxy-authz-tokens
                key: access
          - name: REFRESH_TOKEN
            valueFrom:
              secretKeyRef:
                name: powermax-proxy-authz-tokens
                key: refresh
        volumeMounts:
          {{- if $authorizationConfigSecret }}
          - name: karavi-authorization-config
            mountPath: /etc/karavi-authorization/config
          {{- else }}
          - name: powermax-reverseproxy-secret
            mountPath: /powermax-reverseproxy-secret
          {{- end }}
          - name: proxy-server-root-certificate
            mountPath: /etc/karavi-authorization/root-certificates
          - name: powermax-config-params
            mountPath: /etc/karavi-authorization
      {{ end }}
      {{ end }}
      volumes:
          {{- if and (hasKey .Values.karaviMetricsPowermax "useSecret") (.Values.karaviMetricsPowermax.useSecret | default false) }}
      - name: powermax-reverseproxy-secret
        secret:
          secretName: {{ required "Must provide defaultCredentialsSecret secret name." .Values.karaviMetricsPowermax.defaultCredentialsSecret }}
          {{- else }}
      - name: powermax-reverseproxy-config
        configMap:
          name: powermax-reverseproxy-config
          {{- end }}
      - name: tls-secret
        secret:
          secretName: otel-collector-tls
          items:
            - key: tls.crt
              path: cert.crt
      - name: certs
        emptyDir: { }
      - name: karavi-metrics-powermax-configmap
        configMap:
          name: karavi-metrics-powermax-configmap
      {{- if and .Values.karaviMetricsPowermax.metrics.enabled .Values.karaviMetricsPowermax.metrics.tlsCertSecret }}
      - name: metrics-tls
        secret:
          secretName: {{ .Values.karaviMetricsPowermax.metrics.tlsCertSecret }}
      {{- end }}
     {{- if hasKey .Values.karaviMetricsPowermax "authorization" }}
     {{- if eq .Values.karaviMetricsPowermax.authorization.enabled true }}
      {{- if $authorizationConfigSecret }}
      - name: karavi-authorization-config
        secret:
          secretName: powermax-karavi-authorization-config
      {{- end }}
      - name: proxy-server-root-certificate
        secret:
          secretName: powermax-proxy-server-root-certificate
      - name: powermax-config-params
        configMap:
          name: powermax-config-params
      {{ end }}
      {{ end }}
      restartPolicy: Always
status: {}

{{ end }}

---
{{- if and .Values.karaviMetricsPowermax.metrics.enabled .Values.karaviMetricsPowermax.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: karavi-metrics-powermax-obs-monitor
  namespace: {{ include "custom.namespace" . }}
  labels:
    app.kubernetes.io/name: karavi-metrics-powermax
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- with .Values.karaviMetricsPowermax.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: karavi-metrics-powermax
      app.kubernetes.io/instance: {{ .Release.Name }}
  namespaceSelector:
    matchNames:
      - {{ include "custom.namespace" . }}
  endpoints:
  - port: obs-metrics
    interval: {{ .Values.karaviMetricsPowermax.metrics.serviceMonitor.interval }}
    {{- if .Values.karaviMetricsPowermax.metrics.serviceMonitor.scrapeTimeout }}
    scrapeTimeout: {{ .Values.karaviMetricsPowermax.metrics.serviceMonitor.scrapeTimeout }}
    {{- end }}
    path: /metrics
    scheme: {{ if .Values.karaviMetricsPowermax.metrics.tlsCertSecret }}https{{ else }}http{{ end }}
    {{- if .Values.karaviMetricsPowermax.metrics.tlsCertSecret }}
    tlsConfig:
      insecureSkipVerify: {{ .Values.karaviMetricsPowermax.metrics.serviceMonitor.insecureSkipVerify }}
      cert:
        secret:
          name: {{ .Values.karaviMetricsPowermax.metrics.tlsCertSecret }}
          key: obs-tls.crt
      keySecret:
        name: {{ .Values.karaviMetricsPowermax.metrics.tlsCertSecret }}
        key: obs-tls.key
    {{- end }}
{{- end }}
