{{ if .Values.karaviMetricsPowerscale.enabled }}
{{- $authorizationConfigSecret := lookup "v1" "Secret" .Release.Namespace "karavi-authorization-config" }}

apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: karavi-metrics-powerscale
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: karavi-metrics-powerscale
  namespace: {{ include "custom.namespace" . }}
spec:
  type: {{ .Values.karaviMetricsPowerscale.service.type }}
  ports:
  - name: karavi-metrics-powerscale
    port: 8080
    targetPort: 8080
  {{- if .Values.karaviMetricsPowerscale.metrics.enabled }}
  - name: obs-metrics
    port: {{ .Values.karaviMetricsPowerscale.metrics.port }}
    targetPort: {{ .Values.karaviMetricsPowerscale.metrics.port }}
  {{- end }}
  selector:
    app.kubernetes.io/name: karavi-metrics-powerscale
    app.kubernetes.io/instance: {{ .Release.Name }}

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: karavi-metrics-powerscale
  namespace: {{ include "custom.namespace" . }}
  labels:
    app.kubernetes.io/name: karavi-metrics-powerscale
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- if hasKey .Values "karaviMetricsPowerscale.authorization" }}
  {{- if eq .Values.karaviMetricsPowerscale.authorization.enabled true }}
  annotations:
    com.dell.karavi-authorization-proxy: "true"
  {{ end }}
  {{ end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: karavi-metrics-powerscale
      app.kubernetes.io/instance: {{ .Release.Name }}
  replicas: 1
  strategy: {}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: karavi-metrics-powerscale
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccount: {{ .Release.Name }}-metrics-powerscale-controller
      containers:
      - name: karavi-metrics-powerscale
        image: {{ .Values.karaviMetricsPowerscale.image }}
        resources: {}
        ports:
        {{- if .Values.karaviMetricsPowerscale.metrics.enabled }}
        - name: obs-metrics
          containerPort: {{ .Values.karaviMetricsPowerscale.metrics.port }}
          protocol: TCP
        {{- end }}
        env:
        - name: POWERSCALE_METRICS_ENDPOINT
          value: "{{ .Values.karaviMetricsPowerscale.endpoint }}"
        - name: POWERSCALE_METRICS_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: TLS_ENABLED
          value: "true"
        {{- if and .Values.karaviMetricsPowerscale.metrics.enabled .Values.karaviMetricsPowerscale.metrics.tlsCertSecret }}
        - name: X_CSI_METRICS_TLS_CERT_FILE
          value: /etc/metrics-tls/tls.crt
        - name: X_CSI_METRICS_TLS_KEY_FILE
          value: /etc/metrics-tls/tls.key
        {{- end }}
        volumeMounts:
        - name: isilon-creds
          mountPath: /isilon-creds
        - name: tls-secret
          mountPath: /etc/ssl/certs
          readOnly: true
        - name: karavi-metrics-powerscale-configmap
          mountPath: /etc/config
        {{- if and .Values.karaviMetricsPowerscale.metrics.enabled .Values.karaviMetricsPowerscale.metrics.tlsCertSecret }}
        - name: metrics-tls
          mountPath: /etc/metrics-tls
          readOnly: true
        {{- end }}
      {{- if hasKey .Values.karaviMetricsPowerscale "authorization" }}
      {{- if eq .Values.karaviMetricsPowerscale.authorization.enabled true }}
      - name: karavi-authorization-proxy
        imagePullPolicy: IfNotPresent
        image: {{ required "Must provide the authorization sidecar container image." .Values.karaviMetricsPowerscale.authorization.sidecarProxy.image }}
        env:
          - name: PROXY_HOST
            value: "{{ .Values.karaviMetricsPowerscale.authorization.proxyHost }}"
          - name: SKIP_CERTIFICATE_VALIDATION
            value: "{{ .Values.karaviMetricsPowerscale.authorization.skipCertificateValidation }}"
          - name: PLUGIN_IDENTIFIER
            value: powerscale
          - name: ACCESS_TOKEN
            valueFrom:
              secretKeyRef:
                name: isilon-proxy-authz-tokens
                key: access
          - name: REFRESH_TOKEN
            valueFrom:
              secretKeyRef:
                name: isilon-proxy-authz-tokens
                key: refresh
        volumeMounts:
          {{- if $authorizationConfigSecret }}
          - name: karavi-authorization-config
            mountPath: /etc/karavi-authorization/config
          {{- else }}
          - name: isilon-creds
            mountPath: /isilon-configs
          {{- end }}
          - name: proxy-server-root-certificate
            mountPath: /etc/karavi-authorization/root-certificates
          - name: isilon-config-params
            mountPath: /etc/karavi-authorization
      {{ end }}
      {{ end }}
      volumes:
      - name: isilon-creds
        secret:
          secretName: isilon-creds
      - name: tls-secret
        secret:
          secretName: otel-collector-tls
          items:
            - key: tls.crt
              path: cert.crt
      - name: karavi-metrics-powerscale-configmap
        configMap:
          name: karavi-metrics-powerscale-configmap
      {{- if and .Values.karaviMetricsPowerscale.metrics.enabled .Values.karaviMetricsPowerscale.metrics.tlsCertSecret }}
      - name: metrics-tls
        secret:
          secretName: {{ .Values.karaviMetricsPowerscale.metrics.tlsCertSecret }}
      {{- end }}
      {{- if hasKey .Values.karaviMetricsPowerscale "authorization" }}
      {{- if eq .Values.karaviMetricsPowerscale.authorization.enabled true }}
      {{- if $authorizationConfigSecret }}
      - name: karavi-authorization-config
        secret:
          secretName: isilon-karavi-authorization-config
      {{- end }}
      - name: proxy-server-root-certificate
        secret:
          secretName: isilon-proxy-server-root-certificate
      - name: isilon-config-params
        configMap:
          name: isilon-config-params
      {{ end }}
      {{ end }}
      restartPolicy: Always
status: {}

---
{{- if and .Values.karaviMetricsPowerscale.metrics.enabled .Values.karaviMetricsPowerscale.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: karavi-metrics-powerscale-obs-monitor
  namespace: {{ include "custom.namespace" . }}
  labels:
    app.kubernetes.io/name: karavi-metrics-powerscale
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- with .Values.karaviMetricsPowerscale.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: karavi-metrics-powerscale
      app.kubernetes.io/instance: {{ .Release.Name }}
  namespaceSelector:
    matchNames:
      - {{ include "custom.namespace" . }}
  endpoints:
  - port: obs-metrics
    interval: {{ .Values.karaviMetricsPowerscale.metrics.serviceMonitor.interval }}
    {{- if .Values.karaviMetricsPowerscale.metrics.serviceMonitor.scrapeTimeout }}
    scrapeTimeout: {{ .Values.karaviMetricsPowerscale.metrics.serviceMonitor.scrapeTimeout }}
    {{- end }}
    path: /metrics
    {{- if and .Values.karaviMetricsPowerscale.metrics.enabled .Values.karaviMetricsPowerscale.metrics.tlsCertSecret }}
    scheme: https
    tlsConfig:
      insecureSkipVerify: {{ .Values.karaviMetricsPowerscale.metrics.serviceMonitor.insecureSkipVerify }}
    {{- end }}
{{- end }}

{{ end }}
