# If the karavi-topology cert and key are provided, deploy a CA Issuer using the cert and key


# If the karavi-metrics-powerstore cert and key are provided, deploy a CA Issuer using the cert and key
{{- if and (.Values.karaviMetricsPowerstore.certificateFile) (.Values.karaviMetricsPowerstore.privateKeyFile) }}
{{- $certificateFileContents := .Values.karaviMetricsPowerstore.certificateFile }}
{{- $privateKeyFileContents := .Values.karaviMetricsPowerstore.privateKeyFile }}
apiVersion: v1
data:
  tls.crt: {{ $certificateFileContents | b64enc }}
  tls.key: {{ $privateKeyFileContents | b64enc }}
kind: Secret
type: kubernetes.io/tls
metadata:
  name: karavi-metrics-powerstore-secret
  namespace: {{ include "custom.namespace" . }}

---

apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: karavi-metrics-powerstore-issuer
  namespace: {{ include "custom.namespace" . }}
spec:
  ca:
    secretName: karavi-metrics-powerstore-secret

---
{{- end }}

# If the otelCollector cert and key are provided, deploy a CA Issuer using the cert and key
{{- if and (.Values.otelCollector.certificateFile) (.Values.otelCollector.privateKeyFile) }}
{{- $certificateFileContents := .Values.otelCollector.certificateFile }}
{{- $privateKeyFileContents := .Values.otelCollector.privateKeyFile }}
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: otel-collector-secret
  namespace: {{ include "custom.namespace" . }}
data:
  tls.crt: {{ $certificateFileContents  | b64enc }}
  tls.key: {{ $privateKeyFileContents | b64enc }}

---

apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: otel-collector-issuer
  namespace: {{ include "custom.namespace" . }}
spec:
  ca:
    secretName: otel-collector-secret

---
{{- end }}

# If any set of cert+key combos are not provided, deploy a selfsigned-issuer
{{- if or 
  (and (not .Values.otelCollector.certificateFile) (not .Values.otelCollector.privateKeyFile)) 
  (and (not .Values.karaviMetricsPowerstore.certificateFile) (not .Values.karaviMetricsPowerstore.privateKeyFile)) 
}}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  {{- if .Values.karaviMetricsPowermax.enabled }}
  name: {{ .Chart.Name }}-selfsigned-issuer
  {{- else }}
  name: selfsigned-issuer
  {{- end }}
  namespace: {{ include "custom.namespace" . }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  selfSigned: {}

---
{{- end }}


apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: otel-collector
  namespace: {{ include "custom.namespace" . }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "15"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  secretName: otel-collector-tls
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  subject:
    organizations:
    - dellemc
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
  - otel-collector
  - otel-collector.karavi.svc.kubernetes.local
  issuerRef:
  {{- if and (.Values.otelCollector.certificateFile) (.Values.otelCollector.privateKeyFile) }}
    name: otel-collector-issuer
  {{- else if .Values.karaviMetricsPowermax.enabled }}
    name: {{ .Chart.Name }}-selfsigned-issuer
  {{- else }}
    name: selfsigned-issuer
  {{- end }}
    kind: Issuer
    group: cert-manager.io

---


apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: karavi-metrics-powerstore
  namespace: {{ include "custom.namespace" . }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  secretName: karavi-metrics-powerstore-tls
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  subject:
    organizations:
    - dellemc
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
  - karavi-metrics-powerstore
  - karavi-metrics-powerstore.karavi.svc.kubernetes.local
  issuerRef:
  {{- if and (.Values.karaviMetricsPowerstore.certificateFile) (.Values.karaviMetricsPowerstore.privateKeyFile) }}
    name: karavi-metrics-powerstore-issuer
  {{- else if .Values.karaviMetricsPowermax.enabled }}
    name: {{ .Chart.Name }}-selfsigned-issuer
  {{- else }}
    name: selfsigned-issuer
  {{- end }}
    kind: Issuer
    group: cert-manager.io

---

{{- if index .Values "cert-manager" "enabled" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cert-manager-cleanup
  namespace: {{ include "custom.namespace" . }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cert-manager-cleanup-{{ .Release.Name }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: ["cert-manager.io"]
  resources: ["certificates", "issuers"]
  verbs: ["delete", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-manager-cleanup-{{ .Release.Name }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
- kind: ServiceAccount
  name: cert-manager-cleanup
  namespace: {{ include "custom.namespace" . }}
roleRef:
  kind: ClusterRole
  name: cert-manager-cleanup-{{ .Release.Name }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cert-manager-cleanup
  namespace: {{ include "custom.namespace" . }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: cert-manager-cleanup
      containers:
      - name: cleanup
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          kubectl delete certificate otel-collector karavi-metrics-powerstore \
            -n {{ include "custom.namespace" . }} --ignore-not-found
          kubectl delete issuer selfsigned-issuer \
            {{ .Chart.Name }}-selfsigned-issuer \
            -n {{ include "custom.namespace" . }} --ignore-not-found
{{- end }}
