{{- if eq (include "csm-authorization.isMetricsEnabled" .) "true" }}
{{- if hasKey .Values.metrics "podMonitor" }}
{{- if eq .Values.metrics.podMonitor.enabled true }}
---
# PodMonitor for Prometheus Operator integration with authorization pods.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ .Release.Name }}-authorization-pod-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-authorization
spec:
  selector:
    matchLabels:
      csm-authorization: enabled
  podMetricsEndpoints:
    - port: metrics
      interval: {{ .Values.metrics.podMonitor.interval | default "30s" }}
      {{- if .Values.metrics.podMonitor.scrapeTimeout }}
      scrapeTimeout: {{ .Values.metrics.podMonitor.scrapeTimeout }}
      {{- end }}
      path: /metrics
      {{- if .Values.metrics.tlsCertSecret }}
      scheme: https
      tlsConfig:
        insecureSkipVerify: {{ .Values.metrics.podMonitor.insecureSkipVerify | default false }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
