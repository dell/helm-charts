{{- if eq .Values.openshift true }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: authorization-gateway
  namespace: {{ include "custom.namespace" . }}
  {{- if .Values.authorization.gateway.annotations }}
  annotations:
    {{- range $key, $value := .Values.authorization.gateway.annotations }}
    {{ $key }}: {{ tpl $value $ | quote }}
    {{- end }}
  {{- end }}
spec:
  host: {{ .Values.authorization.hostname }}
  port:
    targetPort: 8080
  tls:
    termination: edge
    {{- if and (.Values.authorization.certificate) (.Values.authorization.privateKey) }}
    certificate: |
      {{ .Values.authorization.certificate | nindent 6 }}
    key: |
      {{ .Values.authorization.privateKey | nindent 6 }}
    {{- end }}
  to:
    kind: Service
    name: proxy-server
    weight: 100
  wildcardPolicy: None
{{- else }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: authorization-gateway
  namespace: {{ include "custom.namespace" . }}
  {{- if .Values.authorization.gateway.annotations }}
  annotations:
    {{- range $key, $value := .Values.authorization.gateway.annotations }}
    {{ $key }}: {{ tpl $value $ | quote }}
    {{- end }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.authorization.gateway.gatewayClassName }}
  listeners:
  - name: https
    protocol: HTTPS
    port: {{ .Values.authorization.gateway.port | default 443 }}
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        {{- if and (.Values.authorization.certificate) (.Values.authorization.privateKey) }}
        name: user-provided-tls
        {{- else }}
        name: karavi-selfsigned-tls
        {{- end }}
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authorization-gateway
  namespace: {{ include "custom.namespace" . }}
spec:
  parentRefs:
  - name: authorization-gateway
    namespace: {{ include "custom.namespace" . }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: proxy-server
      port: 8080
{{- end }}
---
# NGINX Gateway Fabric resources with proper Helm ownership
{{- if not .Values.openshift }}
{{- if .Values.authorization.gateway.gatewayClassName }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authorization-gateway-nginx
  namespace: {{ include "custom.namespace" . }}
  labels:
    app.kubernetes.io/name: authorization-gateway-nginx
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: authorization-gateway-nginx
  labels:
    app.kubernetes.io/name: authorization-gateway-nginx
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: ["services", "serviceaccounts"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: authorization-gateway-nginx
  labels:
    app.kubernetes.io/name: authorization-gateway-nginx
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: authorization-gateway-nginx
  namespace: {{ include "custom.namespace" . }}
roleRef:
  kind: ClusterRole
  name: authorization-gateway-nginx
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authorization-gateway-nginx
  namespace: {{ include "custom.namespace" . }}
  labels:
    app.kubernetes.io/name: authorization-gateway-nginx
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authorization-gateway-nginx
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authorization-gateway-nginx
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: Helm
        gateway.networking.k8s.io/gateway-name: authorization-gateway
      annotations:
        meta.helm.sh/release-name: {{ .Release.Name }}
        meta.helm.sh/release-namespace: {{ .Release.Namespace }}
        prometheus.io/port: "9113"
        prometheus.io/scrape: "true"
    spec:
      serviceAccountName: authorization-gateway-nginx
      containers:
      - name: nginx
        image: ghcr.io/nginx/nginx-gateway-fabric/nginx:2.4.2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 443
          name: port-443
          protocol: TCP
        - containerPort: 9113
          name: metrics
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 3
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 1001
          runAsUser: 101
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /etc/nginx-agent
          name: nginx-agent
        - mountPath: /var/run/secrets/ngf
          name: nginx-agent-tls
        - mountPath: /var/run/secrets/ngf/serviceaccount
          name: token
        - mountPath: /var/log/nginx-agent
          name: nginx-agent-log
        - mountPath: /var/lib/nginx-agent
          name: nginx-agent-lib
        - mountPath: /etc/nginx/conf.d
          name: nginx-conf
        - mountPath: /etc/nginx/stream-conf.d
          name: nginx-stream-conf
        - mountPath: /etc/nginx/main-includes
          name: nginx-main-includes
        - mountPath: /etc/nginx/events-includes
          name: nginx-events-includes
        - mountPath: /etc/nginx/secrets
          name: nginx-secrets
        - mountPath: /var/run/nginx
          name: nginx-run
        - mountPath: /var/cache/nginx
          name: nginx-cache
        - mountPath: /etc/nginx/includes
          name: nginx-includes
      initContainers:
      - command:
        - /usr/bin/gateway
        - initialize
        - --source
        - /agent/nginx-agent.conf
        - --destination
        - /etc/nginx-agent
        - --source
        - /includes/main.conf
        - --destination
        - /etc/nginx/main-includes
        - --source
        - /includes/events.conf
        - --destination
        - /etc/nginx/events-includes
        env:
        - name: POD_UID
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.uid
        - name: CLUSTER_UID
          value: {{ .Values.clusterID | default (randAlphaNum 32) }}
        image: ghcr.io/nginx/nginx-gateway-fabric:2.4.2
        imagePullPolicy: IfNotPresent
        name: init
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 1001
          runAsUser: 101
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /agent
          name: nginx-agent-config
        - mountPath: /etc/nginx-agent
          name: nginx-agent
        - mountPath: /includes
          name: nginx-includes-bootstrap
        - mountPath: /etc/nginx/main-includes
          name: nginx-main-includes
        - mountPath: /etc/nginx/events-includes
          name: nginx-events-includes
      securityContext:
        fsGroup: 1001
        runAsNonRoot: true
        sysctls:
        - name: net.ipv4.ip_unprivileged_port_start
          value: "0"
      volumes:
      - name: token
        projected:
          defaultMode: 420
          sources:
          - serviceAccountToken:
              audience: authorization-nginx-gateway-fabric.authorization.svc
              expirationSeconds: 3600
              path: token
      - emptyDir: {}
        name: nginx-agent
      - configMap:
          defaultMode: 420
          name: authorization-gateway-nginx-agent-config
        name: nginx-agent-config
      - name: nginx-agent-tls
        secret:
          defaultMode: 420
          secretName: authorization-gateway-nginx-agent-tls
      - emptyDir: {}
        name: nginx-agent-log
      - emptyDir: {}
        name: nginx-agent-lib
      - emptyDir: {}
        name: nginx-conf
      - emptyDir: {}
        name: nginx-stream-conf
      - emptyDir: {}
        name: nginx-main-includes
      - emptyDir: {}
        name: nginx-events-includes
      - emptyDir: {}
        name: nginx-secrets
      - emptyDir: {}
        name: nginx-run
      - emptyDir: {}
        name: nginx-cache
      - emptyDir: {}
        name: nginx-includes
      - configMap:
          defaultMode: 420
          name: authorization-gateway-nginx-includes-bootstrap
        name: nginx-includes-bootstrap
---
apiVersion: v1
kind: Service
metadata:
  name: authorization-gateway-nginx
  namespace: {{ include "custom.namespace" . }}
  labels:
    app.kubernetes.io/name: authorization-gateway-nginx
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: authorization-gateway-nginx
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
  - name: port-443
    port: 443
    protocol: TCP
    targetPort: 443
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authorization-gateway-nginx-includes-bootstrap
  namespace: {{ include "custom.namespace" . }}
  labels:
    app.kubernetes.io/name: authorization-gateway-nginx
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
data:
  events.conf: |2

    worker_connections 1024;
  main.conf: |2

    error_log stderr info;
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authorization-gateway-nginx-agent-config
  namespace: {{ include "custom.namespace" . }}
  labels:
    app.kubernetes.io/name: authorization-gateway-nginx
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
data:
  nginx-agent.conf: |
    command:
        server:
            host: {{ .Release.Name }}-nginx-gateway-fabric.{{ .Release.Namespace }}.svc
            port: 443
        auth:
            tokenpath: /var/run/secrets/ngf/serviceaccount/token
        tls:
            cert: /var/run/secrets/ngf/tls.crt
            key: /var/run/secrets/ngf/tls.key
            ca: /var/run/secrets/ngf/ca.crt
            server_name: {{ .Release.Name }}-nginx-gateway-fabric.{{ .Release.Namespace }}.svc
    allowed_directories:
    - /etc/nginx
    - /usr/share/nginx
    - /var/run/nginx
    features:
    - configuration
    - certificates
    - metrics
    labels:
        cluster-id: {{ .Values.clusterID | default (randAlphaNum 32) }}
        control-id: {{ .Values.controlID | default (randAlphaNum 32) }}
        control-name: {{ .Release.Name }}-nginx-gateway-fabric
        control-namespace: {{ .Release.Namespace }}
        owner-name: {{ .Release.Name }}_authorization-gateway-nginx
        owner-type: Deployment
        product-type: ngf
        product-version: {{ .Chart.AppVersion }}
    collector:
        log:
           path: "stdout"
        exporters:
            prometheus:
                server:
                    host: "0.0.0.0"
                    port: {{ .Values.nginxGateway.metrics.port | default 9113 }}
        pipelines:
            metrics:
                "default":
                    receivers: ["host_metrics", "nginx_metrics"]
                    exporters: ["prometheus"]
{{- end }}
{{- end }}
