{{- if eq .Values.openshift true }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: proxy-server
  namespace: {{ include "custom.namespace" . }}
  annotations:
    route.openshift.io/termination: "edge"
    {{- if .Values.authorization.gateway.annotations }}
    {{- range $key, $value := .Values.authorization.gateway.annotations }}
    {{ $key }}: {{ tpl $value $ | quote }}
    {{- end }}
    {{- end }}
spec:
  tls:
  - hosts:
      - {{ .Values.authorization.hostname }}
      {{- if .Values.authorization.gateway.hosts }}
      {{- range .Values.authorization.gateway.hosts }}
      - {{ tpl . $ }}
      {{- end }}
      {{- end }}
    {{- if and (.Values.authorization.certificate) (.Values.authorization.privateKey) }}
    secretName: user-provided-tls
    {{- else }}
    secretName: karavi-selfsigned-tls
    {{- end }}
  rules:
  - host: {{ .Values.authorization.hostname }}
    http:
      paths:
        - backend:
            service:
              name: proxy-server
              port:
                number: 8080
          path: /
          pathType: Prefix
  {{- if .Values.authorization.gateway.hosts }}
  {{- range .Values.authorization.gateway.hosts }}
  - host: {{ tpl . $ }}
    http:
      paths:
        - backend:
            service:
              name: proxy-server
              port:
                number: 8080
          path: /
          pathType: Prefix
  {{- end }}
  {{- end }}
{{- else }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "custom.namespace" . }}-gateway
  namespace: {{ include "custom.namespace" . }}
  {{- if .Values.authorization.gateway.annotations }}
  annotations:
    {{- range $key, $value := .Values.authorization.gateway.annotations }}
    {{ $key }}: {{ tpl $value $ | quote }}
    {{- end }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.authorization.gateway.gatewayClassName }}
  listeners:
  - name: https
    protocol: HTTPS
    port: {{ .Values.authorization.gateway.port | default 443 }}
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        {{- if and (.Values.authorization.certificate) (.Values.authorization.privateKey) }}
        name: user-provided-tls
        {{- else }}
        name: karavi-selfsigned-tls
        {{- end }}
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "custom.namespace" . }}-gateway
  namespace: {{ include "custom.namespace" . }}
spec:
  parentRefs:
  - name: {{ include "custom.namespace" . }}-gateway
    namespace: {{ include "custom.namespace" . }}
  hostnames:
  - {{ .Values.authorization.hostname | quote }}
  {{- if .Values.authorization.gateway.hosts }}
  {{- range .Values.authorization.gateway.hosts }}
  - {{ tpl . $ | quote }}
  {{- end }}
  {{- end }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: proxy-server
      port: 8080
{{- end }}
