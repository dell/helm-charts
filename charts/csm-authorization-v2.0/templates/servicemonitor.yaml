{{- if eq (include "csm-authorization.isMetricsEnabled" .) "true" }}
{{- if hasKey .Values.metrics "serviceMonitor" }}
{{- if eq .Values.metrics.serviceMonitor.enabled true }}
---
# ServiceMonitor for Prometheus Operator integration with authorization services.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-authorization-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-authorization
spec:
  selector:
    matchLabels:
      csm-authorization: enabled
  endpoints:
    - port: metrics
      interval: {{ .Values.metrics.serviceMonitor.interval | default "30s" }}
      {{- if .Values.metrics.serviceMonitor.scrapeTimeout }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout }}
      {{- end }}
      path: /metrics
      {{- if .Values.metrics.tlsCertSecret }}
      scheme: https
      tlsConfig:
        insecureSkipVerify: {{ .Values.metrics.serviceMonitor.insecureSkipVerify | default false }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
