{{- $redisSecretProviderClass := .Values.redis.redisSecretProviderClass | default dict }}
{{- $redisSecretProviderClassName := $redisSecretProviderClass.secretProviderClassName }}
{{- $redisSecretName := $redisSecretProviderClass.redisSecretName }}

{{- $configSecretProviderClass := .Values.config.configSecretProviderClass | default dict }}
{{- $configSecretProviderClassName := $configSecretProviderClass.secretProviderClassName }}

# Combine SPC names from different providers
{{- $allSPCNames := (list $redisSecretProviderClassName $configSecretProviderClassName) }}
{{- $allSPCNames = compact $allSPCNames }}
{{- $allSPCNames = uniq $allSPCNames }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-service
  namespace: {{ include "custom.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tenant-service-tokenreview-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: tenant-service
    namespace: {{ include "custom.namespace" . }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-service
  namespace: {{ include "custom.namespace" . }}
  labels:
    app: tenant-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant-service
  template:
    metadata:
      labels:
        app: tenant-service
        {{- if eq (include "csm-authorization.isMetricsEnabled" .) "true" }}
        csm-authorization: enabled
        {{- end }}
      {{- if or (hasKey $redisSecretProviderClass "conjur") (hasKey $configSecretProviderClass "conjur") }}
      annotations:
        conjur.org/secrets: |
          {{- if hasKey $redisSecretProviderClass "conjur" }}
          {{- with $redisSecretProviderClass.conjur }}
          - {{ .usernamePath }}: {{ .usernamePath | quote }}
          - {{ .passwordPath }}: {{ .passwordPath | quote }}
          {{- end }}
          {{- end }}
          {{- if hasKey $configSecretProviderClass "conjur" }}
          {{- with $configSecretProviderClass.conjur }}
          - {{ .secretPath }}: {{ .secretPath | quote }}
          {{- end }}
          {{- end }}
      {{- end }}
    spec:
      serviceAccountName: tenant-service
      containers:
      - name: tenant-service
        image: {{ required "Must provide the tenant-service image." .Values.authorization.images.tenantService.image }}
        imagePullPolicy: Always
        env:
          {{- $str := "" -}}
          {{- $ns := include "custom.namespace" . -}}
          {{- $replicas := .Values.redis.replicas | int }}
          {{- $sentinel := .Values.redis.sentinel }}
          {{- range $i, $e := until $replicas }}
          {{- if $i }}
          {{- $str = print $str "," -}}
          {{- end }}
          {{- $str = printf "%s%s-%d.%s.%s.svc.cluster.local:5000" $str $sentinel $i $sentinel $ns -}}
          {{- end }}
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ $redisSecretName | default "redis-csm-secret" }}
                key: {{ $redisSecretProviderClass.redisPasswordKey | default "password" }}
        {{- if eq (include "csm-authorization.isMetricsEnabled" .) "true" }}
          - name: X_CSI_METRICS_ENABLED
            value: "true"
          - name: X_CSI_METRICS_PORT
            value: "{{ .Values.metrics.port | default 8443 }}"
          {{- if .Values.metrics.tlsCertSecret }}
          - name: X_CSI_METRICS_TLS_CERT_FILE
            value: "/etc/metrics-tls/tls.crt"
          - name: X_CSI_METRICS_TLS_KEY_FILE
            value: "/etc/metrics-tls/tls.key"
          {{- end }}
          - name: X_CSI_METRICS_COLLECTION_INTERVAL
            value: "{{ .Values.metrics.collection.interval | default "30s" }}"
          - name: X_CSI_METRICS_COLLECTION_CACHE_TTL
            value: "{{ .Values.metrics.collection.cacheTTL | default "25s" }}"
        {{- end }}
        args:
          - "--redis-sentinel={{ $str }}"
          - "--redis-password=$(REDIS_PASSWORD)"
        ports:
        - containerPort: 50051
          name: grpc
        {{- if eq (include "csm-authorization.isMetricsEnabled" .) "true" }}
        - name: metrics
          containerPort: {{ .Values.metrics.port | default 8443 }}
        {{- end }}
        volumeMounts:
        - name: config-volume
          mountPath: /etc/karavi-authorization/config
        - name: csm-config-params
          mountPath: /etc/karavi-authorization/csm-config-params
        # secret provider class mounts
        {{- range $name := $allSPCNames }}
        - name: secrets-store-inline-{{ $name }}
          mountPath: /etc/csm-authorization/{{ $name }}
          readOnly: true
        {{- end }}
        {{- if and (eq (include "csm-authorization.isMetricsEnabled" .) "true") .Values.metrics.tlsCertSecret }}
        - name: authorization-metrics-tls
          mountPath: /etc/metrics-tls
          readOnly: true
        {{- end }}
      volumes:
      - name: config-volume
        secret:
          secretName: {{ $configSecretProviderClass.configSecretName | default "karavi-config-secret" }}
      - name: csm-config-params
        configMap:
          name: csm-config-params
      # secret provider classes
      {{- range $name := $allSPCNames }}
      - name: secrets-store-inline-{{ $name }}
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "{{ $name }}"
      {{- end }}
      {{- if and (eq (include "csm-authorization.isMetricsEnabled" .) "true") .Values.metrics.tlsCertSecret }}
      - name: authorization-metrics-tls
        secret:
          secretName: {{ .Values.metrics.tlsCertSecret }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-service
  namespace: {{ include "custom.namespace" . }}
  {{- if eq (include "csm-authorization.isMetricsEnabled" .) "true" }}
  labels:
    csm-authorization: enabled
  {{- end }}
spec:
  selector:
    app: tenant-service
  ports:
  - port: 50051
    targetPort: 50051
    name: grpc
  {{- if eq (include "csm-authorization.isMetricsEnabled" .) "true" }}
  - name: metrics
    port: {{ .Values.metrics.port | default 8443 }}
    targetPort: {{ .Values.metrics.port | default 8443 }}
  {{- end }}
