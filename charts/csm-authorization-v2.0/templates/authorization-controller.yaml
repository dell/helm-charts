# Controller
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authorization-controller
  namespace: {{ include "custom.namespace" . }}
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: authorization-controller
rules:
  - apiGroups: ["csm-authorization.storage.dell.com"]
    resources: ["csmroles"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["csm-authorization.storage.dell.com"]
    resources: ["csmroles/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["csm-authorization.storage.dell.com"]
    resources: ["csmroles/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["csm-authorization.storage.dell.com"]
    resources: ["csmtenants"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["csm-authorization.storage.dell.com"]
    resources: ["csmtenants/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["csm-authorization.storage.dell.com"]
    resources: ["csmtenants/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["csm-authorization.storage.dell.com"]
    resources: ["storages"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["csm-authorization.storage.dell.com"]
    resources: ["storages/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["csm-authorization.storage.dell.com"]
    resources: ["storages/finalizers"]
    verbs: ["update"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: authorization-controller
subjects:
  - kind: ServiceAccount
    name: authorization-controller
    namespace: {{ include "custom.namespace" . }}
roleRef:
  kind: ClusterRole
  name: authorization-controller
  apiGroup: rbac.authorization.k8s.io
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: authorization-controller
  namespace:  {{ include "custom.namespace" . }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "update", "get", "list"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: authorization-controller
  namespace:  {{ include "custom.namespace" . }}
subjects:
  - kind: ServiceAccount
    name: authorization-controller
    namespace:  {{ include "custom.namespace" . }}
roleRef:
  kind: Role
  name: authorization-controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authorization-controller
  namespace: {{ include "custom.namespace" . }}
  labels:
    app: authorization-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authorization-controller
  template:
    metadata:
      labels:
        app: authorization-controller
        {{- if eq (include "csm-authorization.isMetricsEnabled" .) "true" }}
        csm-authorization: enabled
        {{- end }}
    spec:
      serviceAccountName: authorization-controller
      containers:
      - name: authorization-controller
        image: {{ required "Must provide the controller image." .Values.authorization.images.authorizationController.image }}
        imagePullPolicy: Always
        args:
          - "--authorization-namespace={{ .Release.Namespace }}"
          - "--health-probe-bind-address=:8081"
          - "--leader-elect=true"
          - "--tenant-service-address=tenant-service.{{ .Release.Namespace }}.svc.cluster.local:50051"
          - "--storage-service-address=storage-service.{{ .Release.Namespace }}.svc.cluster.local:50051"
          - "--role-service-address=role-service.{{ .Release.Namespace }}.svc.cluster.local:50051"
        env:
          - name: NAMESPACE
            value: {{ include "custom.namespace" . }}
        {{- if eq (include "csm-authorization.isMetricsEnabled" .) "true" }}
          - name: X_CSI_METRICS_ENABLED
            value: "true"
          - name: X_CSI_METRICS_PORT
            value: "{{ .Values.metrics.port | default 8443 }}"
          {{- if .Values.metrics.tlsCertSecret }}
          - name: X_CSI_METRICS_TLS_CERT_FILE
            value: "/etc/metrics-tls/tls.crt"
          - name: X_CSI_METRICS_TLS_KEY_FILE
            value: "/etc/metrics-tls/tls.key"
          {{- end }}
          - name: X_CSI_METRICS_COLLECTION_INTERVAL
            value: "{{ .Values.metrics.collection.interval | default "30s" }}"
          - name: X_CSI_METRICS_COLLECTION_CACHE_TTL
            value: "{{ .Values.metrics.collection.cacheTTL | default "25s" }}"
        {{- end }}
        ports:
        - containerPort: 50052
          name: http
        {{- if eq (include "csm-authorization.isMetricsEnabled" .) "true" }}
        - name: metrics
          containerPort: {{ .Values.metrics.port | default 8443 }}
        {{- end }}
        volumeMounts:
        - name: csm-config-params
          mountPath: /etc/karavi-authorization/csm-config-params
        {{- if and (eq (include "csm-authorization.isMetricsEnabled" .) "true") .Values.metrics.tlsCertSecret }}
        - name: authorization-metrics-tls
          mountPath: /etc/metrics-tls
          readOnly: true
        {{- end }}
      volumes:
      - name: csm-config-params
        configMap:
          name: csm-config-params
      {{- if and (eq (include "csm-authorization.isMetricsEnabled" .) "true") .Values.metrics.tlsCertSecret }}
      - name: authorization-metrics-tls
        secret:
          secretName: {{ .Values.metrics.tlsCertSecret }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: authorization-controller
  namespace: {{ include "custom.namespace" . }}
  {{- if eq (include "csm-authorization.isMetricsEnabled" .) "true" }}
  labels:
    csm-authorization: enabled
  {{- end }}
spec:
  selector:
    app: authorization-controller
  ports:
  - port: 50052
    targetPort: 50052
    name: http
  {{- if eq (include "csm-authorization.isMetricsEnabled" .) "true" }}
  - name: metrics
    port: {{ .Values.metrics.port | default 8443 }}
    targetPort: {{ .Values.metrics.port | default 8443 }}
  {{- end }}
---
