# replicas: Defines number of controller replicas
# Allowed values: int
# Default value: 1
replicas: 1

# image: Defines controller image. This shouldn't be changed
# Allowed values: string
image: quay.io/dell/container-storage-modules/dell-replication-controller:v1.16.0

# logLevel: Defines initial log level for controller. This can be changed in runtime
# Allowed values: "debug", "info", "warn", "error", "panic"
# Default value: "info"
logLevel: "info"

# leaderElection: Enable leader election for dell-replication-controller manager.
# Enabling this will ensure there is only one active dell-replication-controller manager.
# Allowed values: "true", "false"
# Default value: "true"
leaderElection: "true"

# retryIntervalMin: Initial retry interval of failed reconcile request.
# It doubles with each failure, upto retry-interval-max
# Allowed values: time
retryIntervalMin: 1s

# retryIntervalMax: Maximum retry interval of failed reconcile request
# Allowed values: time
retryIntervalMax: 5m

# disablePVCRemap: Disable PVC remapping for replication in single cluster configuration
# Allowed values: "true", "false"
# Default value: "false"
disablePVCRemap: "false"

# enableKubevirtPVCRemap: Enable KubeVirt PVC remapping functionality
# When enabled, the replication controller will handle DataVolume dependencies
# during PVC remap for KubeVirt-backed PVCs.
# Allowed values: "true", "false"
# Default value: "false"
enableKubevirtPVCRemap: "false"

# allowPvcCreationOnTarget: It Creates PVC on target cluster using replicated PV.
# Allowed values:
#   true: It creates a PVC on target cluster against replicated PV
#   false: simply updates claimref on replicated PV on target cluster without actually creating a PVC
# Default value: false
allowPvcCreationOnTarget: "false"

# metrics: configuration for replication metrics and monitoring
metrics:
  # enabled: Enable/Disable the replication metrics endpoint.
  # Type: bool
  # Default: false
  # Effect: When true, the controller Deployment receives X_CSI_REPLICATION_METRICS_ENABLED=true,
  #         X_CSI_REPLICATION_METRICS_PORT, and a metrics Service is created.
  enabled: false

  # port: Port on which the replication metrics endpoint is exposed.
  # Type: integer
  # Default: 8445
  # Effect: Passed as X_CSI_REPLICATION_METRICS_PORT to the controller container; used as targetPort in the Service.
  port: 8445

  # tlsCertSecret: Name of a Kubernetes TLS Secret whose "tls.crt" and "tls.key" entries
  # are used to serve the metrics endpoint over HTTPS instead of plain HTTP.
  # Leave empty (the default) to use plain HTTP.
  # Type: string
  # Default: "" (disabled - plain HTTP)
  tlsCertSecret: ""

  # collection: Controls metrics collection cadence for replication metrics.
  collection:
    interval: 30s

  # serviceMonitor: Controls optional Prometheus Operator ServiceMonitor creation.
  serviceMonitor:
    # enabled: When true, a ServiceMonitor CR is created for automatic Prometheus Operator integration.
    # Type: bool
    # Default: false
    # Effect: Requires the Prometheus Operator CRDs to be installed in the cluster.
    enabled: false
    # interval: Prometheus scrape interval for the metrics endpoint.
    # Type: string (Prometheus duration, e.g. "30s", "1m")
    # Default: "30s"
    interval: "30s"
    # scrapeTimeout: Prometheus scrape timeout for the metrics endpoint.
    # Type: string (Prometheus duration, e.g. "10s")
    # Default: "" (unset)
    scrapeTimeout: ""
    # insecureSkipVerify: Controls TLS certificate verification when scraping metrics.
    # Only used when metrics.tlsCertSecret is set (HTTPS endpoint).
    # Type: bool
    # Default: false
    insecureSkipVerify: false

# HostAliases: Optional features that allows <hostname:IP> entries injection into pod's /etc/hosts file
